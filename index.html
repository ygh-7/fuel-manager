<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>记油费 - 油费管理系统</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, "Microsoft YaHei", sans-serif; background: #f0f2f5; font-size: 16px; margin: 0; padding: 0 12px 60px 12px; }
h1 { text-align: center; font-size: 22px; color: #d84315; margin: 10px 0; }

.nav { display: flex; gap: 6px; margin-bottom: 12px; background: #fff; padding: 5px; border-radius: 10px; }
.nav a { flex: 1; padding: 10px 2px; font-size: 14px; font-weight: bold; border-radius: 8px; background: #eee; color: #666; text-align: center; text-decoration: none; display: block; }
.nav a.active { background: #ff9800; color: #fff; }

.card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: bold; color: #444; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #f5f5f5; }

label { display: block; font-size: 14px; font-weight: bold; color: #555; margin: 10px 0 4px 0; }
input, select { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; background: #fafafa; }

.btn { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; color: #fff; background: #ff9800; display: block; text-align: center; }
.btn-green { background: #4caf50; }
.btn-red { background: #ef5350; }
.btn-gray { background: #78909c; }
.btn-sm { width: auto; padding: 6px 12px; font-size: 13px; margin-top: 0; display: inline-block; }

.item-box { background: #fff8e1; border-left: 3px solid #ff9800; padding: 10px; border-radius: 8px; margin: 8px 0; }
.item-title { font-weight: bold; font-size: 15px; }
.item-info { font-size: 13px; color: #666; margin-top: 2px; }
.item-right { text-align: right; font-weight: bold; color: #e65100; font-size: 16px; }

.total-box { background: #e65100; color: #fff; border-radius: 10px; padding: 14px; text-align: center; margin: 10px 0; }
.total-box .big { font-size: 28px; font-weight: bold; }
.total-box .small { font-size: 13px; margin-top: 4px; }

.tip-box { background: #e3f2fd; border-left: 3px solid #2196f3; padding: 10px; border-radius: 8px; margin: 8px 0; font-size: 13px; color: #1565c0; }

.version { text-align: center; font-size: 11px; color: #999; margin-top: 20px; padding-bottom: 10px; }
</style>
</head>
<body>
<h1>油费管理系统</h1>

<div class="nav">
    <a href="index.html" class="active">记油费</a>
    <a href="vehicles.html">车辆管理</a>
    <a href="reports.html">报表导出</a>
</div>

<div class="card">
    <div class="card-title">今日基本信息</div>
    <label>日期（默认今天，可点击修改）</label>
    <input type="date" id="inpDate">

    <label>今日油价（元/升）</label>
    <input type="text" id="inpPrice" placeholder="例如：7.2">
</div>

<div class="card">
    <div class="card-title">添加加油记录</div>
    <label>车牌号</label>
    <select id="inpPlate"><option value="">请选择...</option></select>

    <label>加油量（升）</label>
    <input type="text" id="inpLiters" placeholder="例如：248">

    <button class="btn btn-green" onclick="addToday()">添加到今日清单</button>
</div>

<div id="todayList"></div>
<div id="todayTotalBox" style="display:none;">
    <div class="total-box">
        <div class="big" id="todayTotalMoney">0.00元</div>
        <div class="small" id="todayTotalInfo">共0辆车，0.00升</div>
    </div>
    <button class="btn" onclick="saveToday()">保存今日记录</button>
    <button class="btn btn-gray" onclick="resetToday()">清空重记</button>
</div>

<div class="card" style="margin-top:20px;">
    <div class="card-title">系统维护</div>
    <div class="tip-box">如果车牌下拉框为空或数据异常，请点击下方按钮重置。</div>
    <button class="btn btn-red" onclick="resetAllData()">重置系统数据（恢复默认车辆）</button>
</div>

<div class="version">版本：v2.2</div>

<script>
var vehicles = [];
var records = [];
var todayCars = [];

var DEFAULT_VEHICLES = [
    {id:1, plate:"云E39069"}, {id:2, plate:"桂AAM620"}, {id:3, plate:"云E39392"},
    {id:4, plate:"云E37261"}, {id:5, plate:"桂AAG276"}, {id:6, plate:"桂AAE552"},
    {id:7, plate:"云F92105"}, {id:8, plate:"云E53286"}, {id:9, plate:"云E38259"},
    {id:10, plate:"卡特挖机"}, {id:11, plate:"云E96105"}, {id:12, plate:"云E37951"},
    {id:13, plate:"桂AAC807"}, {id:14, plate:"云E35052"}, {id:15, plate:"云E52737"},
    {id:16, plate:"云E55476"}
];

function loadData() {
    try {
        var v = localStorage.getItem('fuel_vehicles');
        var r = localStorage.getItem('fuel_records');
        if (v) {
            var parsed = JSON.parse(v);
            if (Array.isArray(parsed) && parsed.length > 0) {
                vehicles = parsed;
            }
        }
        if (r) {
            var parsedR = JSON.parse(r);
            if (Array.isArray(parsedR)) {
                records = parsedR;
            }
        }
    } catch(e) {
        console.log('数据读取失败，使用默认数据');
    }

    if (!Array.isArray(vehicles) || vehicles.length === 0) {
        vehicles = JSON.parse(JSON.stringify(DEFAULT_VEHICLES));
        saveVehicles();
    }
}

function saveVehicles() {
    try { localStorage.setItem('fuel_vehicles', JSON.stringify(vehicles)); } catch(e) {}
}

function saveRecords() {
    try { localStorage.setItem('fuel_records', JSON.stringify(records)); } catch(e) {}
}

function loadPlateSelect() {
    var sel = document.getElementById('inpPlate');
    sel.innerHTML = '<option value="">请选择...</option>';

    if (!Array.isArray(vehicles) || vehicles.length === 0) {
        var opt = document.createElement('option');
        opt.value = "";
        opt.innerHTML = "【暂无车辆，请重置系统数据】";
        sel.appendChild(opt);
        return;
    }

    for (var i = 0; i < vehicles.length; i++) {
        var opt = document.createElement('option');
        opt.value = vehicles[i].plate;
        opt.innerHTML = vehicles[i].plate;
        sel.appendChild(opt);
    }
}

function addToday() {
    var plate = document.getElementById('inpPlate').value;
    var liters = parseFloat(document.getElementById('inpLiters').value);
    var price = parseFloat(document.getElementById('inpPrice').value);

    if (!plate) { alert('请选择车牌'); return; }
    if (!liters || liters <= 0) { alert('请输入加油量'); return; }
    if (!price || price <= 0) { alert('请输入油价'); return; }

    var amount = Math.round(liters * price * 100) / 100;
    todayCars.push({plate: plate, liters: liters, amount: amount});

    document.getElementById('inpLiters').value = '';
    document.getElementById('inpPlate').value = '';

    showTodayList();
}

function showTodayList() {
    var box = document.getElementById('todayList');
    var totalBox = document.getElementById('todayTotalBox');

    if (todayCars.length === 0) {
        box.innerHTML = '';
        totalBox.style.display = 'none';
        return;
    }

    totalBox.style.display = 'block';
    var html = '';
    var total = 0;
    var totalLiters = 0;
    var price = document.getElementById('inpPrice').value || '0';

    for (var i = 0; i < todayCars.length; i++) {
        var c = todayCars[i];
        total += c.amount;
        totalLiters += c.liters;
        html += '<div class="item-box">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<div>' +
            '<div class="item-title">' + c.plate + '</div>' +
            '<div class="item-info">' + c.liters.toFixed(2) + '升 x ' + price + '元/升</div>' +
            '</div>' +
            '<div style="display:flex;align-items:center;">' +
            '<div class="item-right" style="margin-right:10px;">' + c.amount.toFixed(2) + '元</div>' +
            '<button class="btn btn-red btn-sm" onclick="delToday(' + i + ')">删除</button>' +
            '</div>' +
            '</div>' +
            '</div>';
    }

    box.innerHTML = html;
    document.getElementById('todayTotalMoney').innerHTML = total.toFixed(2) + '元';
    document.getElementById('todayTotalInfo').innerHTML = '共' + todayCars.length + '辆车，' + totalLiters.toFixed(2) + '升';
}

function delToday(idx) {
    var newCars = [];
    for (var i = 0; i < todayCars.length; i++) {
        if (i !== idx) newCars.push(todayCars[i]);
    }
    todayCars = newCars;
    showTodayList();
}

function saveToday() {
    var date = document.getElementById('inpDate').value;
    var price = parseFloat(document.getElementById('inpPrice').value);
    if (!date) { alert('请选择日期'); return; }
    if (!price) { alert('请输入油价'); return; }
    if (todayCars.length === 0) { alert('请至少添加一辆车'); return; }

    var totalAmount = 0;
    var totalLiters = 0;
    for (var i = 0; i < todayCars.length; i++) {
        totalAmount += todayCars[i].amount;
        totalLiters += todayCars[i].liters;
    }

    var foundIdx = -1;
    for (var i = 0; i < records.length; i++) {
        if (records[i].date === date) { foundIdx = i; break; }
    }

    if (foundIdx >= 0) {
        if (!confirm('该日期已有记录，是否覆盖？点"取消"则追加到原有记录')) {
            for (var i = 0; i < todayCars.length; i++) {
                records[foundIdx].cars.push(todayCars[i]);
            }
            records[foundIdx].totalAmount = 0;
            records[foundIdx].totalLiters = 0;
            for (var i = 0; i < records[foundIdx].cars.length; i++) {
                records[foundIdx].totalAmount += records[foundIdx].cars[i].amount;
                records[foundIdx].totalLiters += records[foundIdx].cars[i].liters;
            }
        } else {
            records[foundIdx] = {
                id: records[foundIdx].id, date: date, price: price,
                cars: todayCars, totalAmount: totalAmount, totalLiters: totalLiters
            };
        }
    } else {
        var maxId = 0;
        for (var i = 0; i < records.length; i++) {
            if (records[i].id > maxId) maxId = records[i].id;
        }
        records.push({
            id: maxId + 1, date: date, price: price,
            cars: todayCars, totalAmount: totalAmount, totalLiters: totalLiters
        });
    }

    saveRecords();
    alert('保存成功');
    resetToday();
}

function resetToday() {
    todayCars = [];
    document.getElementById('inpPrice').value = '';
    document.getElementById('inpLiters').value = '';
    document.getElementById('todayList').innerHTML = '';
    document.getElementById('todayTotalBox').style.display = 'none';
}

function resetAllData() {
    if (!confirm('确定要重置系统数据吗？这会恢复默认的16辆车，但不会删除已保存的加油记录。')) return;

    vehicles = JSON.parse(JSON.stringify(DEFAULT_VEHICLES));
    saveVehicles();
    loadPlateSelect();
    alert('已重置为默认车辆，请重新选择车牌');
}

function pad2(n) {
    return n < 10 ? '0' + n : '' + n;
}

function init() {
    var d = new Date();
    var today = d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
    document.getElementById('inpDate').value = today;
    loadData();
    loadPlateSelect();
}

init();
</script>
</body>
</html>
